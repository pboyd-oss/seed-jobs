# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: en-US
# Style guidance applied to all generated review prose and suggestions.
tone_instructions: >-
  Senior staff-engineer review. Flag silent failures, swallowed errors,
  degraded fallbacks, magic values, stringly-typed enums, and unvalidated
  boundary input. Prefer root-cause fixes over patches. Never use em-dashes;
  use a hyphen or a new sentence.
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
      - master
  path_filters:
    - "!**/*.lock"
    - "!**/go.sum"
    - "!**/vendor/**"
    - "!**/charts/**"
    - "!**/*.min.js"
    - "!**/dist/**"
    - "!**/node_modules/**"
    # Terramate/OpenTofu generated files (gitignored, regenerated by `terramate generate`)
    - "!**/backend.tf"
    - "!**/provider.tf"
  path_instructions:
    - path: "**/*.go"
      instructions: >-
        Enforce explicit error handling: no swallowed errors, no returned nil on
        a failure path, wrap with context. Flag use of bare string literals where
        a typed enum/constant exists. Check for race conditions, nil derefs, and
        unclosed resources (defer Close). Prefer table-driven tests for new logic.
    - path: "**/*_test.go"
      instructions: >-
        A regression test must replicate the REAL failing scenario (same inputs and
        data shape), not a narrower unit that can stay green while the bug lives.
        Flag tests that would pass with the bug present.
    - path: "**/*.py"
      instructions: >-
        I/O and tool functions must catch and RETURN errors as values, never raise
        into the caller's request path. Validate external input at the boundary.
        Flag broad `except` that swallows the cause. No hardcoded placeholders with
        a TODO; represent absent data explicitly.
    - path: "**/*.{tf,tfvars,hcl}"
      instructions: >-
        No wildcard IAM actions/resources, no public RDS or 0.0.0.0/0 ingress on
        sensitive ports, no hardcoded account IDs/secrets (use variables). Flag
        identity-adjacent resources that could be destroyed by an automated apply.
    - path: "**/*.{sh,bash}"
      instructions: >-
        Require `set -euo pipefail` (or documented reason). Quote expansions, avoid
        unquoted command substitution on untrusted paths. Flag secrets echoed to
        logs or written world-readable.
    - path: "**/*.rego"
      instructions: >-
        Verify deny/allow rules fail closed (absent/unknown input => deny). Ensure
        every policy has a corresponding _test.rego covering both pass and fail.
    - path: "**/Dockerfile*"
      instructions: >-
        Pin base images, prefer the Harbor mirror for external pulls, run as
        non-root, no secrets baked into layers.
  auto_apply_labels: true
  labeling_instructions:
    - label: "type/feature"
      instructions: "Apply when the PR adds new functionality or a user-facing capability."
    - label: "type/fix"
      instructions: "Apply when the PR fixes a bug or incorrect behavior."
    - label: "type/docs"
      instructions: "Apply when the PR only changes documentation, comments, or markdown."
    - label: "type/refactor"
      instructions: "Apply when the PR restructures code without changing external behavior."
    - label: "type/test"
      instructions: "Apply when the PR only adds or modifies tests."
    - label: "type/chore"
      instructions: "Apply for build, CI, dependency, or tooling changes with no application-logic change."
    - label: "type/perf"
      instructions: "Apply when the PR's primary purpose is a performance improvement."
    - label: "type/security"
      instructions: "Apply when the PR touches auth, secrets, crypto, IAM, input validation, or fixes a vulnerability."
    - label: "breaking-change"
      instructions: "Apply when the PR introduces a backward-incompatible API, schema, config, or CLI change."

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  code_guidelines:
    # Ingest the repo's own engineering standards as review guidelines.
    filePatterns:
      - "CLAUDE.md"
      - "**/CLAUDE.md"
      - ".claude/**"
      - "known-issues.md"
      - "docs/**/*.md"
