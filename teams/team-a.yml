team:
  name: "Team Alpha"
  slug: team-a
  build_cloud: build-shared

  members:
    - username: jdoe
      role: admin
    - username: jsmith
      role: developer

  repositories:
    - name: auth-api
      url: https://github.com/pboyd-oss/auth-api.git
      jobs:
        - name: build
          type: multibranch
          jenkinsfile: Jenkinsfile
        - name: release
          type: pipeline
          branch: main
          jenkinsfile: Jenkinsfile.release

    - name: data-api
      url: https://github.com/pboyd-oss/data-api.git
      jobs:
        - name: build
          type: multibranch
          jenkinsfile: Jenkinsfile
        - name: nightly-cleanup
          type: pipeline
          branch: main
          jenkinsfile: Jenkinsfile.cleanup
          cron: "H 2 * * *"

    - name: nginx-pipeline
      url: https://github.com/pboyd-oss/nginx-pipeline.git
      coverage_threshold: 0
      jobs:
        - name: build
          type: pipeline
          branch: main
          jenkinsfile: Jenkinsfile

    - name: microservice-pipeline
      url: https://github.com/pboyd-oss/microservice-pipeline.git
      coverage_threshold: 0
      jobs:
        - name: build
          type: pipeline
          branch: main
          jenkinsfile: Jenkinsfile

    - name: graph-kb
      url: https://github.com/pboyd-oss/graph-kb.git
      coverage_threshold: 0
      jobs:
        - name: build
          type: multibranch
          jenkinsfile: Jenkinsfile

    - name: platform-agent
      url: https://github.com/pboyd-oss/platform-agent.git
      coverage_threshold: 0
      jobs:
        - name: build
          type: pipeline
          branch: main
          jenkinsfile: Jenkinsfile

  environments:
    - name: dev
      cloud: build-shared
    - name: staging
      cloud: deploy-staging
      namespace: team-a-staging
    - name: production-eu
      cloud: deploy-prod-eu
      namespace: team-a-prod
    - name: production-us
      cloud: deploy-prod-us
      namespace: team-a-prod
